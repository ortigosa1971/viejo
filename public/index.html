<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HISTORICO ALFARNATE</title>
    <style>
      :root { --bg:#0b0f14; --card:#121821; --ink:#e8eef7; --muted:#9fb0c6; --accent:#6ec1ff; --line:#223042; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; background:var(--bg); color:var(--ink); line-height:1.5; }
      header { padding: 16px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #0b0f14, #0b0f14e0); position: sticky; top:0; z-index: 5; }
      h1 { margin:0; font-size: clamp(22px, 5vw, 28px); text-align:center; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
      .form { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:12px; }
      label { font-size: 13px; color: var(--muted); display:block; margin-bottom:6px; }
      input, button { width:100%; padding:14px 12px; border-radius: 10px; border:1px solid var(--line); background:#0d131b; color:var(--ink); font-size:15px; }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }
      button { cursor:pointer; background: #0f1823; border-color:#1e2b3c; }
      button.primary { background: #102033; border-color:#28507a; font-weight:bold; }
      .kpigrid { display:grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap:12px; margin-top:16px; }
      .kpi { background:#0d131b; border:1px dashed var(--line); padding:12px; border-radius:10px; text-align:center; }
      .kpi b { display:block; font-size:13px; color: var(--muted); }
      .kpi span { font-size:22px; display:block; margin-top:4px; }
      .table-container { overflow-x:auto; margin-top:16px; border-radius:12px; }
      table { width:100%; border-collapse: collapse; background:#0d131b; min-width:700px; }
      thead th { position: sticky; top: 64px; background:#101722; }
      th, td { border-bottom: 1px solid #172333; text-align:left; padding:10px; font-size: 14px; }
      tr:hover td { background:#0f1621; }
      .row { display:flex; gap:10px; }
      .row > * { flex:1; }
      @media (max-width: 800px){
        .form { grid-template-columns: 1fr; }
        .kpigrid { grid-template-columns: 1fr 1fr; }
        thead th { top: 120px; font-size:13px; }
        th, td { font-size: 13px; padding:8px; }
        button, input { font-size:14px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <h1>HISTORICO ALFARNATE</h1>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <div class="form">
          <!-- Campo oculto con ID de estación -->
          <input id="stationId" value="IALFAR32" type="hidden" />
          
          <div>
            <label for="date">Fecha (YYYY‑MM‑DD)</label>
            <input id="date" type="date" />
          </div>
          <div class="row">
            <button id="loadBtn" class="primary">Cargar datos</button>
            <button id="csvBtn">Exportar CSV</button>
          </div>
          <div>
            <label>&nbsp;</label>
            <div id="status" style="padding:10px 12px;border:1px dashed var(--line);border-radius:10px;color:var(--muted);">
              Listo
            </div>
          </div>
        </div>

        <div class="kpigrid">
          <div class="kpi"><b>Obs. totales</b><span id="kpiCount">—</span></div>
          <div class="kpi"><b>Temp. mín</b><span id="kpiMin">—</span></div>
          <div class="kpi"><b>Temp. máx</b><span id="kpiMax">—</span></div>
        </div>

        <div class="table-container">
          <table id="dataTable">
            <thead>
              <tr>
                <th>Hora local</th>
                <th>Temp (°C)</th>
                <th>P. rocío (°C)</th>
                <th>Humedad (%)</th>
                <th>Presión (hPa)</th>
                <th>Viento (km/h)</th>
                <th>Ráfaga (km/h)</th>
                <th>Dir (°)</th>
                <th>Precip (mm)</th>
                <th>UV</th>
                <th>Rad (W/m²)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
